<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src * data: blob:; media-src * blob:; connect-src * 'self' http://127.0.0.1:* ws://127.0.0.1:* http://localhost:* ws://localhost:* https://* wss://*; worker-src 'self' blob:;">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#863bff" />
    <meta name="description" content="MufYard - Gençlik ve Spor Bakanlığı Dijital Müfettiş Yardımcısı" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MufYard" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>MufYard V-2.0</title>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading screen (disappears when React mounts) -->
      <div id="pre-loader" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f172a;gap:16px;">
        <style>
          @keyframes spin{to{transform:rotate(360deg)}}
          @keyframes pulse-text{0%,100%{opacity:.4}50%{opacity:1}}
          #pre-loader-spinner{width:40px;height:40px;border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;}
          #pre-loader-text{color:rgba(147,197,253,.5);font-family:system-ui,sans-serif;font-size:13px;font-weight:600;animation:pulse-text 2s ease-in-out infinite;}
        </style>
        <div id="pre-loader-spinner"></div>
        <p id="pre-loader-text">Sistem Yükleniyor...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker Registration (PWA)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
